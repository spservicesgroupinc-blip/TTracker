
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GeoTime Tracker</title>

    <!-- PWA Meta Tags -->
    <meta name="description" content="Track your work hours with GPS location verification" />
    <meta name="theme-color" content="#1877F2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GeoTime" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              fb: {
                blue: '#1877F2',
                'blue-hover': '#166FE5',
                'blue-dark': '#1565C0',
                green: '#42B72A',
                'green-hover': '#36A420',
                red: '#FA3E3C',
                bg: '#F0F2F5',
                card: '#FFFFFF',
                text: '#050505',
                'text-secondary': '#65676B',
                'text-tertiary': '#8A8D91',
                divider: '#CED0D4',
                'input-border': '#DDDFE2',
                'input-focus': '#1877F2',
                'hover-bg': '#F2F2F2',
                'active-bg': '#E4E6EB',
              },
            },
            fontFamily: {
              fb: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
            },
            boxShadow: {
              'fb': '0 1px 2px rgba(0, 0, 0, 0.1)',
              'fb-lg': '0 2px 8px rgba(0, 0, 0, 0.1)',
              'fb-xl': '0 8px 30px rgba(0, 0, 0, 0.12)',
            },
            keyframes: {
              'slide-up': {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
            },
            animation: {
              'slide-up': 'slide-up 0.3s ease-out',
            },
          },
        },
      }
    </script>
    <style>
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
      @media (max-width: 767px) {
        .pb-16 { padding-bottom: calc(4rem + env(safe-area-inset-bottom, 0px)); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "jspdf": "https://aistudiocdn.com/jspdf@^3.0.3",
    "jspdf-autotable": "https://aistudiocdn.com/jspdf-autotable@^5.0.2"
  }
}
</script>
</head>
  <body class="bg-fb-bg font-fb overscroll-none">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
